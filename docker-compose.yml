version: "3.9"

services:
  api:
    build: .
    container_name: content-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - db
      - minio

  db:
    image: postgres:16
    container_name: content-api-db
    environment:
      POSTGRES_DB: content_api
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:RELEASE.2025-01-20T14-49-07Z
    container_name: content-api-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  minio_data:
